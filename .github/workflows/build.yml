name: Build luci-app-mentohust package

on:
  push:
    branches: [ main, master ]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create release'
        required: false
        type: boolean
        default: false
      release_tag:
        description: 'Release tag'
        required: false
        type: string
        default: ''

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PACKAGE_NAME: luci-app-mentohust
  SDK_NAME: openwrt-sdk-23.05.5-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64
  SDK_ARCHIVE: openwrt-sdk.tar.xz
  SDK_URL: https://downloads.openwrt.org/releases/23.05.5/targets/mediatek/filogic/openwrt-sdk-23.05.5-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
    
    steps:
    - name: Checkout source
      uses: actions/checkout@v5

    - name: Prepare environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3

    - name: Cache SDK archive
      id: cache-sdk
      uses: actions/cache@v5
      with:
        path: ${{ env.SDK_ARCHIVE }}
        key: ${{ runner.os }}-${{ env.SDK_NAME }}-archive

    - name: Download OpenWrt SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      run: |
        echo "Cache miss, downloading SDK"
        wget -O "$SDK_ARCHIVE" "$SDK_URL"

    - name: Extract SDK
      run: |
        mkdir sdk
        tar -xf "$SDK_ARCHIVE" -C sdk --strip-components=1
        echo "SDK is ready"

    - name: Cache OpenWrt downloads
      uses: actions/cache@v5
      with:
        path: sdk/dl
        key: ${{ runner.os }}-${{ env.SDK_NAME }}-dl
        restore-keys: |
          ${{ runner.os }}-${{ env.SDK_NAME }}-

    - name: Prepare feeds and package
      run: |
        cd sdk
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        rm -rf "package/$PACKAGE_NAME"
        mkdir -p "package/$PACKAGE_NAME"
        cp -r ../Makefile ../luasrc ../root "package/$PACKAGE_NAME/"
        
        make defconfig

    - name: Compile package
      id: compile
      run: |
        cd sdk
        echo "Start compiling package"
        set -o pipefail
        make "package/$PACKAGE_NAME/compile" V=s -j$(nproc) 2>&1 | tee build.log || {
          echo "Package compilation failed"
          exit 1
        }

    - name: Locate and rename package
      id: find_ipk
      if: success()
      run: |
        IPK_FILE=$(find sdk/bin/packages/ -name "$PACKAGE_NAME*.ipk" | head -n 1)
        if [ -z "$IPK_FILE" ]; then
          echo "Error: IPK file not found!"
          find sdk/bin/ -name "*.ipk"
          exit 1
        fi
        
        PKG_VERSION=$(grep "^PKG_VERSION:=" Makefile | cut -d'=' -f2)
        PKG_RELEASE=$(grep "^PKG_RELEASE:=" Makefile | cut -d'=' -f2)
        MAKEFILE_VERSION="${PKG_VERSION}-${PKG_RELEASE}"
        if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.release_tag }}" ]; then
          VERSION="${{ inputs.release_tag }}"
        elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${{ github.ref_name }}"
        else
          VERSION="${MAKEFILE_VERSION}-dev-$(date +%Y%m%d)"
        fi
        
        NEW_NAME="${PACKAGE_NAME}_${VERSION}_aarch64_cortex-a53.ipk"
        NEW_PATH="$(dirname $IPK_FILE)/$NEW_NAME"
        
        cp "$IPK_FILE" "$NEW_PATH"
        
        echo "ipk_file=$NEW_PATH" >> $GITHUB_OUTPUT
        echo "ipk_name=$NEW_NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "makefile_version=$MAKEFILE_VERSION" >> $GITHUB_OUTPUT
        echo "Found: $IPK_FILE"
        echo "Renamed to: $NEW_PATH"
        echo "Makefile Version: $MAKEFILE_VERSION"

    - name: Upload package artifact
      if: success()
      uses: actions/upload-artifact@v6
      with:
        name: ${{ env.PACKAGE_NAME }}-${{ steps.find_ipk.outputs.version }}
        path: ${{ steps.find_ipk.outputs.ipk_file }}
        compression-level: 0

    - name: Upload build logs
      if: always() 
      uses: actions/upload-artifact@v6
      with:
        name: build-logs
        path: |
          sdk/build.log
          sdk/.config
        if-no-files-found: ignore
        retention-days: 3

    - name: Publish release on tag push
      if: startsWith(github.ref, 'refs/tags/') && success()
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.find_ipk.outputs.ipk_file }}
        body: |
          ## luci-app-mentohust ${{ steps.find_ipk.outputs.version }}
          
          **文件名**: `${{ steps.find_ipk.outputs.ipk_name }}`
          
          ### 安装方法
          ```bash
          opkg install ${{ steps.find_ipk.outputs.ipk_name }}
          ```
        generate_release_notes: true

    - name: Create release tag
      if: github.event_name == 'workflow_dispatch' && inputs.create_release && inputs.release_tag != '' && success()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "${{ inputs.release_tag }}" -m "Release ${{ inputs.release_tag }}"
        git push origin "${{ inputs.release_tag }}"

    - name: Publish release on manual trigger
      if: github.event_name == 'workflow_dispatch' && inputs.create_release && inputs.release_tag != '' && success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.release_tag }}
        name: ${{ inputs.release_tag }}
        files: ${{ steps.find_ipk.outputs.ipk_file }}
        body: |
          ## luci-app-mentohust ${{ inputs.release_tag }}
          
          **文件名**: `${{ steps.find_ipk.outputs.ipk_name }}`
          
          ### 安装方法
          ```bash
          opkg install ${{ steps.find_ipk.outputs.ipk_name }}
          ```
        generate_release_notes: true
        draft: false
        prerelease: false
