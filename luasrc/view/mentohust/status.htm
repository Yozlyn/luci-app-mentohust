<%+header%>
<style>
.mentohust-overview {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    margin: 10px 0 6px;
    align-items: stretch;
}

.mentohust-overview::after {
    content: "";
    order: 2;
    width: 1px;
    align-self: stretch;
    margin: 0 16px;
    background: linear-gradient(to bottom, rgba(0, 0, 0, 0), rgba(180, 180, 180, 0.85), rgba(0, 0, 0, 0));
}

.mentohust-panel {
    min-width: 220px;
    flex: 1 1 0;
    padding: 8px 18px 10px;
    background: transparent;
    box-sizing: border-box;
}

.mentohust-panel:first-child {
    order: 1;
    padding-left: 14px;
}

.mentohust-panel:last-child {
    order: 3;
    padding-right: 18px;
}

.mentohust-panel-label {
    margin-bottom: 4px;
    color: #666;
}

.mentohust-panel-value {
    font-size: 16px;
    font-weight: 600;
}

.mentohust-panel-value.text-only {
    display: block;
}

@media (max-width: 640px) {
    .mentohust-overview {
        flex-direction: column;
    }

    .mentohust-overview::after {
        width: auto;
        height: 1px;
        margin: 4px 0;
        background: linear-gradient(to right, rgba(0, 0, 0, 0), rgba(180, 180, 180, 0.85), rgba(0, 0, 0, 0));
    }

    .mentohust-panel:first-child,
    .mentohust-panel:last-child {
        padding-left: 0;
        padding-right: 0;
    }

    .mentohust-actions {
        padding-left: 0;
    }
}

.mentohust-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
    padding-left: 12px;
}

.mentohust-actions .cbi-button {
    min-width: 110px;
}

.cbi-button-clear {
    background-color: #e7604a;
    color: #fff;
    border: 1px solid #d44a36;
}

.cbi-button-clear:hover {
    background-color: #d44a36;
}

.mentohust-log-wrap {
    margin-top: 20px;
}

.mentohust-log {
    width: 100%;
    min-height: 420px;
    padding: 10px;
    border: 1px solid #d9d9d9;
    background: #1f1f1f;
    color: #d7d7d7;
    font-family: Consolas, Menlo, Monaco, "Courier New", monospace;
    font-size: 12px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    box-sizing: border-box;
    resize: vertical;
}

.mentohust-log-note {
    margin-top: 6px;
    color: #666;
    text-align: right;
}
</style>
<h2 name="content"><%:MentoHUST 802.1x 认证%></h2>
<div class="cbi-map">
    <fieldset class="cbi-section">
        <legend><%:运行概览%></legend>
        <div class="cbi-section-node">
            <p><%:展示当前服务状态，当前页面会自动刷新。%></p>
            <div class="mentohust-summary">
                <div class="mentohust-overview">
                    <div class="mentohust-panel">
                        <div class="mentohust-panel-label"><%:服务状态%></div>
                        <div id="status_text" class="mentohust-panel-value"><%:检测中...%></div>
                    </div>
                    <div class="mentohust-panel">
                        <div class="mentohust-panel-label"><%:开机自启%></div>
                        <div id="enabled_text" class="mentohust-panel-value text-only"><%:检测中...%></div>
                    </div>
                </div>
                <div class="mentohust-actions">
                    <button type="button" class="cbi-button cbi-button-reset" onclick="action('stop')"><%:停止服务%></button>
                    <button type="button" class="cbi-button cbi-button-reload" onclick="action('restart')"><%:重启服务%></button>
                    <button type="button" class="cbi-button cbi-button-clear" onclick="clearLog()"><%:清除日志%></button>
                    <button type="button" class="cbi-button cbi-button-link" onclick="updateLog()"><%:刷新日志%></button>
                </div>
            </div>
            <div class="mentohust-log-wrap">
                <textarea id="log_area" class="mentohust-log" readonly><%:正在加载日志...%></textarea>
                <div class="mentohust-log-note"><%:当前仅显示日志 /tmp/mentohust.log 的最后 100 行。%></div>
            </div>
        </div>
    </fieldset>
</div>
<script type="text/javascript">//<![CDATA[
    var statusText = document.getElementById('status_text');
    var enabledText = document.getElementById('enabled_text');
    var logArea = document.getElementById('log_area');

    function getTs() {
        return '?t=' + Math.random();
    }

    function updateStatus() {
        XHR.get('<%=url("admin/services/mentohust/get_status")%>' + getTs(), null, function(x, data) {
            if (!data) {
                return;
            }

            if (!data.configured) {
                statusText.innerHTML = '<%:请配置账号%>';
                statusText.style.color = '#d08a00';
            } else if (data.running) {
                statusText.innerHTML = '<%:运行中%>';
                statusText.style.color = '#4caf50';
            } else {
                statusText.innerHTML = '<%:已停止%>';
                statusText.style.color = '#f44336';
            }

            if (data.enabled) {
                enabledText.innerHTML = '<span style="color:green;font-weight:bold"><%:已启用%></span>';
            } else {
                enabledText.innerHTML = '<span style="color:red"><%:未启用%></span>';
            }
        });
    }

    function updateLog() {
        XHR.get('<%=url("admin/services/mentohust/get_log")%>' + getTs(), null, function(x) {
            if (x.responseText) {
                if (logArea.value !== x.responseText) {
                    logArea.value = x.responseText;
                    logArea.scrollTop = logArea.scrollHeight;
                }
            } else {
                logArea.value = '<%:暂无日志数据%>';
            }
        });
    }

    function action(act) {
        if (act === 'restart') {
            statusText.innerHTML = '<%:重启中...%>';
            statusText.style.color = '#e6a23c';
        }

        XHR.post('<%=url("admin/services/mentohust/service_action")%>' + getTs(), {action: act}, function(x, data) {
            if (data && data.success) {
                setTimeout(function() {
                    updateStatus();
                    updateLog();
                }, 1500);
            } else {
                updateStatus();
            }
        });
    }

    function clearLog() {
        XHR.post('<%=url("admin/services/mentohust/clear_log")%>' + getTs(), {}, function(x, data) {
            if (data && data.success) {
                updateLog();
            } else {
                updateLog();
            }
        });
    }

    updateStatus();
    updateLog();
    window.setInterval(function() {
        updateStatus();
        updateLog();
    }, 3000);
//]]></script>
<%+footer%>
